<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chore Widget</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            /* 1. Transparent Background */
            background-color: transparent !important;
            color: #ffffff;
            font-family: "Montserrat", "Arial Black", -apple-system, sans-serif;
            
            /* 2. Strict Frame Bounds */
            width: 100px;
            height: 59px;
            overflow: hidden;
            padding: 2px;
        }

        /* 3. Eye-Catching Header Style */
        .header h1 {
            font-size: 9px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #00ffcc; /* Vibrant Neon Cyan */
            text-shadow: 0 0 4px rgba(0, 255, 204, 0.6);
            text-align: center;
            margin-bottom: 2px;
            line-height: 1;
        }

        /* Auto-Scrolling Container */
        .ticker-window {
            width: 100%;
            height: 44px;
            overflow: hidden;
            position: relative;
        }

        .ticker-content {
            display: flex;
            flex-direction: column;
            position: relative;
            animation: scrollChores 24s infinite linear;
        }

        /* Child Entry Layout */
        .child-row {
            width: 100%;
            padding: 2px 0;
            border-bottom: 1px dashed rgba(255,255,255,0.1);
        }

        .child-name {
            font-size: 8px;
            font-weight: 700;
            color: #ff007f; /* Neon Pink to contrast the header */
            text-transform: uppercase;
            margin-bottom: 1px;
        }

        .chore-text {
            font-size: 7px;
            line-height: 1.2;
            color: #e0e0e0;
            white-space: pre-line;
        }

        .rest-text {
            font-size: 8px;
            text-align: center;
            color: #ffcc00;
            margin-top: 10px;
            font-weight: bold;
        }

        /* Continuous Scroll Animation loop */
        @keyframes scrollChores {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50%); }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Chores</h1>
    </div>

    <div class="ticker-window">
        <div class="ticker-content" id="ticker-box">
            <!-- Populated dynamically via JS -->
        </div>
    </div>

    <script>
        const choreDatabase = {
            1: [ // Monday
                { name: "Jay", tasks: "• Zone A Vac\n• Dinner Wipe" },
                { name: "Jake", tasks: "• Baci Walk\n• Recycling" },
                { name: "Nate", tasks: "• Trash/Rec\n• Zone B Vac" },
                { name: "Ellie", tasks: "• Dishwasher\n• Pool Towels" },
                { name: "Gabe", tasks: "• Foyer Pick" },
                { name: "V&B", tasks: "• Bookshelves" }
            ],
            2: [ // Tuesday
                { name: "Jay", tasks: "• Baci Feed\n• Up Bath Light" },
                { name: "Jake", tasks: "• Dinner Wipe\n• Cans Back" },
                { name: "Nate", tasks: "• LAUNDRY\n• Dishwasher" },
                { name: "Ellie", tasks: "• Zone A Vac\n• Pool Skim" },
                { name: "Gabe", tasks: "• Basement" },
                { name: "V&B", tasks: "• Shoe Match" }
            ],
            3: [ // Wednesday
                { name: "Jay", tasks: "• Zone B Vac\n• Dishwasher" },
                { name: "Jake", tasks: "• LAUNDRY\n• Trash Curb" },
                { name: "Nate", tasks: "• Trash/Rec\n• Poop Scoop" },
                { name: "Ellie", tasks: "• Dinner Wipe\n• Pool Towels" },
                { name: "Gabe", tasks: "• Foyer Pick" },
                { name: "V&B", tasks: "• Toy Helper" }
            ],
            4: [ // Thursday
                { name: "Jay", tasks: "• LAUNDRY\n• Baci Walk" },
                { name: "Jake", tasks: "• Zone A Vac\n• Cans Back" },
                { name: "Nate", tasks: "• Dinner Wipe\n• Pool Vac" },
                { name: "Ellie", tasks: "• Up Bath Light\n• Dishwasher" },
                { name: "Gabe", tasks: "• Basement" },
                { name: "V&B", tasks: "• Bookshelves" }
            ],
            5: [ // Friday
                { name: "Jay", tasks: "• Dishwasher\n• Pool Towels" },
                { name: "Jake", tasks: "• Zone B Vac\n• Poop Scoop" },
                { name: "Nate", tasks: "• Baci Feed\n• Basement Vac" },
                { name: "Ellie", tasks: "• LAUNDRY\n• Dinner Wipe" },
                { name: "Gabe", tasks: "• Foyer Pick" },
                { name: "V&B", tasks: "• Shoe Match" }
            ],
            6: [ // Saturday
                { name: "Jay", tasks: "• Up Bath Deep\n• Fold Towels" },
                { name: "Jake", tasks: "• 1/2 Bath Clean\n• Kitchen Mop" },
                { name: "Nate", tasks: "• Pool Vac\n• Pool Skim" },
                { name: "Ellie", tasks: "• Dishwasher\n• Basement" },
                { name: "Team", tasks: "• Toy Roundup\n• Shoe Match" }
            ]
        };

        function initWidget() {
            const dayOfWeek = new Date().getDay();
            const container = document.getElementById('ticker-box');
            
            if (dayOfWeek === 0) {
                container.innerHTML = '<div class="rest-text">Sabbath Rest</div>';
                container.style.animation = 'none';
                return;
            }

            const todayChores = choreDatabase[dayOfWeek];
            let htmlPayload = '';

            // Generate content tags
            todayChores.forEach(item => {
                htmlPayload += `
                    <div class="child-row">
                        <div class="child-name">${item.name}</div>
                        <div class="chore-text">${item.tasks}</div>
                    </div>
                `;
            });

            // Duplicate the payload block to create a seamless infinite scrolling cycle loop
            container.innerHTML = htmlPayload + htmlPayload;
        }

        window.onload = initWidget;
    </script>
</body>
</html>
