<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAKboard Custom Wide Chore Chart</title>
    <style>
        :root {
            --card-bg: rgba(30, 30, 30, 0.75); /* Semi-transparent to blend with wallpaper */
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: #b0b0b0;
            --accent-color: #00ffcc; /* Vivid neon cyan match */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Montserrat", "Segoe UI", Roboto, sans-serif;
            /* 1. Transparent Background */
            background-color: transparent !important;
            color: var(--text-main);
            padding: 20px 30px;
            overflow: hidden;
            /* 2. Scaled to match 23" x 8" dimensions */
            width: 2208px;
            height: 768px;
        }

        /* Header Layout Styling */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--card-border);
            padding-bottom: 10px;
        }

        /* 3. Eye-Catching Neon Header Color & Font */
        .header h1 {
            font-size: 38px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #00ffcc; /* Neon Cyan */
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }

        .header .day-display {
            font-size: 28px;
            color: #ff007f; /* Vibrant Neon Pink */
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.4);
            font-weight: 700;
            text-transform: uppercase;
        }

        /* 6-Column Sibling Row (Optimized for ultra-wide display) */
        .chore-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-gap: 20px;
            height: calc(100% - 90px);
        }

        /* Child Entry Cards */
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(5px); /* Smoothly blurs whatever is behind the card */
            border-radius: 14px;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .card-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 15px;
            text-align: center;
        }

        /* Circular Photos */
        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--card-border);
            background-color: rgba(255,255,255,0.05);
            margin-bottom: 10px;
        }

        .card h2 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* Touch-Friendly Tasks */
        .task-list {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .task-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            cursor: pointer;
            padding: 4px;
        }

        .task-item input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 26px;
            height: 26px;
            border: 2px solid var(--text-muted);
            border-radius: 6px;
            outline: none;
            background-color: transparent;
            cursor: pointer;
            display: grid;
            place-content: center;
            margin-top: 2px;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }

        .task-item input[type="checkbox"]:checked {
            background-color: #00ffcc;
            border-color: #00ffcc;
        }

        .task-item input[type="checkbox"]:checked::before {
            content: "✓";
            color: #121212;
            font-size: 18px;
            font-weight: bold;
        }

        .task-item label {
            font-size: 16px;
            line-height: 1.3;
            color: var(--text-main);
            cursor: pointer;
            user-select: none;
        }

        .task-item input[type="checkbox"]:checked + label {
            color: var(--text-muted);
            text-decoration: line-through;
            opacity: 0.6;
        }

        /* Sabbath Layout */
        .rest-day {
            grid-column: span 6;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            height: 400px;
        }

        .rest-day h2 {
            font-size: 56px;
            color: #00ffcc;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .rest-day p {
            font-size: 26px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

        function buildChoreChart() {
            const today = new Date();
            const dayOfWeek = today.getDay(); 
            
            const gridContainer = document.getElementById('chore-grid');
            const dateDisplay = document.getElementById('date-display');

            if (dayOfWeek === 0) {
                dateDisplay.innerText = "Sunday";
                gridContainer.innerHTML = `
                    <div class="rest-day">
                        <h2>Sabbath Day of Rest</h2>
                        <p>No scheduled tasks. Enjoy your day off together!</p>
                    </div>
                `;
                return;
            }

            const currentDayData = choreDatabase[dayOfWeek];
            dateDisplay.innerText = `${currentDayData.name} Rotation`;

            let gridHTML = '';
            currentDayData.tasks.forEach((group, groupIdx) => {
                let checklistHTML = '';
                group.chores.forEach((chore, choreIdx) => {
                    const uniqueID = `chk-${groupIdx}-${choreIdx}`;
                    checklistHTML += `
                        <div class="task-item" onclick="document.getElementById('${uniqueID}').click(); event.stopPropagation();">
                            <input type="checkbox" id="${uniqueID}" onclick="event.stopPropagation();">
                            <label for="${uniqueID}">${chore}</label>
                        </div>
                    `;
                });

                gridHTML += `
                    <div class="card">
                        <div class="card-header">
                            <img class="avatar" src="${group.img}" alt="${group.child}" onerror="this.style.backgroundColor='rgba(255,255,255,0.1)';">
                            <h2>${group.child}</h2>
                        </div>
                        <div class="task-list">
                            ${checklistHTML}
                        </div>
                    </div>
                `;
            });

            gridContainer.innerHTML = gridHTML;
        }

        window.onload = buildChoreChart;
    </script>
</body>
</html>
