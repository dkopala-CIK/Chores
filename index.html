<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAKboard Custom Chore Chart</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --card-border: #2c2c2c;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --accent-color: #4caf50;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 40px 60px;
            overflow: hidden;
            width: 1920px;
            height: 1080px;
        }

        /* Header Styles */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 2px solid var(--card-border);
            padding-bottom: 20px;
        }

        .header h1 {
            font-size: 42px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .header .day-display {
            font-size: 32px;
            color: var(--text-muted);
            font-weight: 300;
        }

        /* Main Grid */
        .chore-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-gap: 40px 50px;
            height: calc(100% - 140px);
        }

        /* Child Chore Card */
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .card-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 25px;
            text-align: center;
        }

        /* Circular Photo Slots */
        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--card-border);
            background-color: #333;
            margin-bottom: 12px;
        }

        .card h2 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Checklist Block - Touch Optimized */
        .task-list {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .task-item {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            cursor: pointer;
            padding: 8px 4px;
        }

        /* Oversized Touch-Target Checkboxes */
        .task-item input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 32px;
            height: 32px;
            border: 2px solid var(--text-muted);
            border-radius: 6px;
            outline: none;
            background-color: transparent;
            cursor: pointer;
            display: grid;
            place-content: center;
            margin-top: 2px;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }

        .task-item input[type="checkbox"]:checked {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
        }

        .task-item input[type="checkbox"]:checked::before {
            content: "✓";
            color: white;
            font-size: 22px;
            font-weight: bold;
        }

        .task-item label {
            font-size: 22px;
            line-height: 1.4;
            color: var(--text-main);
            cursor: pointer;
            user-select: none;
            transition: color 0.2s ease;
        }

        .task-item input[type="checkbox"]:checked + label {
            color: var(--text-muted);
            text-decoration: line-through;
        }

        /* Rest Day View */
        .rest-day {
            grid-column: span 3;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            height: 600px;
        }

        .rest-day h2 {
            font-size: 64px;
            color: var(--accent-color);
            margin-bottom: 20px;
        }

        .rest-day p {
            font-size: 32px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

        function buildChoreChart() {
            const today = new Date();
            const dayOfWeek = today.getDay(); // 0 = Sunday, 1 = Monday, etc.
            
            const gridContainer = document.getElementById('chore-grid');
            const dateDisplay = document.getElementById('date-display');
            const titleDisplay = document.getElementById('chart-title');

            // Handle Sunday Day of Rest
            if (dayOfWeek === 0) {
                dateDisplay.innerText = "Sunday";
                titleDisplay.innerText = "Day of Rest";
                gridContainer.innerHTML = `
                    <div class="rest-day">
                        <h2>Sunday Rest Day</h2>
                        <p>No scheduled chores today. Enjoy family time!</p>
                    </div>
                `;
                return;
            }

            // Fetch active day dataset
            const currentDayData = choreDatabase[dayOfWeek];
            dateDisplay.innerText = `${currentDayData.name} Schedule`;

            // Build grid nodes
            let gridHTML = '';
            currentDayData.tasks.forEach((group, groupIdx) => {
                let checklistHTML = '';
                group.chores.forEach((chore, choreIdx) => {
                    const uniqueID = `chk-${groupIdx}-${choreIdx}`;
                    checklistHTML += `
                        <div class="task-item" onclick="document.getElementById('${uniqueID}').click(); event.stopPropagation();">
                            <input type="checkbox" id="${uniqueID}" onclick="event.stopPropagation();">
                            <label for="${uniqueID}">${chore}</label>
                        </div>
                    `;
                });

                gridHTML += `
                    <div class="card">
                        <div class="card-header">
                            <!-- Swap src text below with actual local asset links over your network -->
                            <img class="avatar" src="${group.img}" alt="${group.child}" onerror="this.style.backgroundColor='#444';">
                            <h2>${group.child}</h2>
                        </div>
                        <div class="task-list">
                            ${checklistHTML}
                        </div>
                    </div>
                `;
            });

            gridContainer.innerHTML = gridHTML;
        }

        // Initialize display engine on load
        window.onload = buildChoreChart;
    </script>
