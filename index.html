<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAKboard Compact Fluid Chore Chart</title>
    <style>
        :root {
            --card-bg: rgba(22, 22, 22, 0.8); /* Darker transparent blend for sharp text contrast */
            --card-border: rgba(255, 255, 255, 0.12);
            --text-main: #ffffff;
            --text-muted: #b8b8b8;
            --accent-color: #00ffcc; /* Vivid neon cyan */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Montserrat", "Segoe UI", Roboto, sans-serif;
            background-color: transparent !important;
            color: var(--text-main);
            padding: 1.5vh 1.5vw;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* Top Bar Header Layout */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5vh;
            border-bottom: 2px solid var(--card-border);
            padding-bottom: 0.8vh;
        }

        .header h1 {
            font-size: 3.5vh;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.3vw;
            color: #00ffcc; 
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }

        .header .day-display {
            font-size: 2.8vh;
            color: #ff007f; /* Vibrant Neon Pink */
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.4);
            font-weight: 700;
            text-transform: uppercase;
        }

        /* Responsive 6-Column Matrix Grid */
        .chore-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-gap: 1.2vw;
            height: calc(100% - 7.5vh);
        }

        /* Individual Child Cards - Shrunken Height Footprint */
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(8px);
            border-radius: 0.8vw;
            padding: 1.2vh 0.8vw; /* Reduced vertical interior space */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            height: 100%; /* Spans full cell height constraint */
        }

        /* Ultra-Tight Dynamic Header */
        .card-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6vw;
            margin-bottom: 1.2vh;
            text-align: center;
            width: 100%;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 0.6vh;
        }

        /* Mini-Avatars to make room for text */
        .avatar {
            width: 4.5vh; 
            height: 4.5vh;
            border-radius: 50%;
            object-fit: cover;
            border: 1.5px solid var(--card-border);
            background-color: rgba(255,255,255,0.05);
        }

        .card h2 {
            font-size: 2.5vh;
            font-weight: 800;
            letter-spacing: 0.3px;
        }

        /* Maximized Text List Box */
        .task-list {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1vh;
            justify-content: center;
            flex-grow: 1; /* Maximizes block balance layout */
        }

        /* Max Font Touch Target Row */
        .task-item {
            display: flex;
            align-items: flex-start;
            gap: 0.6vw;
            cursor: pointer;
            padding: 0.4vh 0;
        }

        /* Oversized Checkbox Targets */
        .task-item input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 3vh;
            height: 3vh;
            border: 2px solid var(--text-muted);
            border-radius: 5px;
            outline: none;
            background-color: transparent;
            cursor: pointer;
            display: grid;
            place-content: center;
            margin-top: 0.2vh;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }

        .task-item input[type="checkbox"]:checked {
            background-color: #00ffcc;
            border-color: #00ffcc;
        }

        .task-item input[type="checkbox"]:checked::before {
            content: "✓";
            color: #121212;
            font-size: 2vh;
            font-weight: bold;
        }

        /* Maximized & Wrapped Text Content */
        .task-item label {
            font-size: 2.2vh; /* Expanded font allocation size */
            font-weight: 600;
            line-height: 1.25;
            color: var(--text-main);
            cursor: pointer;
            user-select: none;
            word-break: break-word; /* Safe wrapping rule execution */
            display: inline-block;
        }

        .task-item input[type="checkbox"]:checked + label {
            color: var(--text-muted);
            text-decoration: line-through;
            opacity: 0.5;
        }

        /* Sabbath Layout View */
        .rest-day {
            grid-column: span 6;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            height: 100%;
        }

        .rest-day h2 {
            font-size: 6vh;
            color: #00ffcc;
            margin-bottom: 2vh;
            text-transform: uppercase;
        }

        .rest-day p {
            font-size: 3vh;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Chore Chart</h1>
        <div class="day-display" id="date-display">Loading...</div>
    </div>

    <div class="chore-grid" id="chore-grid">
        <!-- Rendered dynamically by script template engines -->
    </div>

    <script>
        const choreDatabase = {

                name: "Monday",

                    { child: "Jay", img: "jay.jpg", chores: ["Zone A Vac (FR/Foyer/Steps)", "Post-Dinner Wipe"] },
                    { child: "Jake", img: "jake.jpg", chores: ["Baci Walk", "Recycling Cans to Curb"] },
                    { child: "Nate", img: "nate.jpg", chores: ["Daily Kitchen Trash/Rec", "Zone B Vac (LR/DR/Kit)"] },
                    { child: "Ellie", img: "ellie.jpg", chores: ["Dishwasher Unload (AM)", "Pool Towel Roundup"] },
                    { child: "Gabe", img: "gabe.jpg", chores: ["Family Room & Foyer Pick"] },
                    { child: "Vera & Ben", img: "vera_ben.jpg", chores: ["Bookshelf Straighten (with Jay)"] }
                ]
            },
            2: { // Tuesday
                name: "Tuesday",
                tasks: [
                    { child: "Jay", img: "jay.jpg", chores: ["Baci Feed & Water (AM)", "Up Bathroom (Light Clean)"] },
                    { child: "Jake", img: "jake.jpg", chores: ["Post-Dinner Wipe", "Bring Recycling Cans Back"] },
                    { child: "Nate", img: "nate.jpg", chores: ["LAUNDRY DAY", "Dishwasher Loader (PM)"] },
                    { child: "Ellie", img: "ellie.jpg", chores: ["Zone A Vac (FR/Foyer/Steps)", "Daily Pool Skimmer"] },
                    { child: "Gabe", img: "gabe.jpg", chores: ["Basement Toy Reset"] },
                    { child: "Vera & Ben", img: "vera_ben.jpg", chores: ["Shoe Matcher (with Ellie)"] }
                ]
            },
            3: { // Wednesday
                name: "Wednesday",
                tasks: [
                    { child: "Jay", img: "jay.jpg", chores: ["Zone B Vac (LR/DR/Kit)", "Dishwasher Unload (AM)"] },
                    { child: "Jake", img: "jake.jpg", chores: ["LAUNDRY DAY", "Trash Cans to Curb (with Dad)"] },
                    { child: "Nate", img: "nate.jpg", chores: ["Daily Kitchen Trash/Rec", "Backyard Poop Scoop"] },
                    { child: "Ellie", img: "ellie.jpg", chores: ["Post-Dinner Wipe", "Pool Towel Roundup"] },
                    { child: "Gabe", img: "gabe.jpg", chores: ["Family Room & Foyer Pick"] },
                    { child: "Vera & Ben", img: "vera_ben.jpg", chores: ["Toy Reset Helper (with Gabe)"] }
                ]
            },
            4: { // Thursday
                name: "Thursday",
                tasks: [
                    { child: "Jay", img: "jay.jpg", chores: ["LAUNDRY DAY", "Baci Walk"] },
                    { child: "Jake", img: "jake.jpg", chores: ["Zone A Vac (FR/Foyer/Steps)", "Bring Trash Cans Back"] },
                    { child: "Nate", img: "nate.jpg", chores: ["Post-Dinner Wipe", "Clean Pool Vac Filters"] },
                    { child: "Ellie", img: "ellie.jpg", chores: ["Up Bathroom (Light Clean)", "Dishwasher Loader"] },
                    { child: "Gabe", img: "gabe.jpg", chores: ["Basement Toy Reset"] },
                    { child: "Vera & Ben", img: "vera_ben.jpg", chores: ["Bookshelf Straighten (with Ellie)"] }
                ]
            },
            5: { // Friday
                name: "Friday",
                tasks: [
                    { child: "Jay", img: "jay.jpg", chores: ["Dishwasher Loader", "Pool Towel Roundup"] },
                    { child: "Jake", img: "jake.jpg", chores: ["Zone B Vac (LR/DR/Kit)", "Backyard Poop Scoop"] },
                    { child: "Nate", img: "nate.jpg", chores: ["Baci Feed & Water", "Zone C Vac (Entire Basement)"] },
                    { child: "Ellie", img: "ellie.jpg", chores: ["LAUNDRY DAY", "Post-Dinner Wipe"] },
                    { child: "Gabe", img: "gabe.jpg", chores: ["Family Room & Foyer Pick"] },
                    { child: "Vera & Ben", img: "vera_ben.jpg", chores: ["Shoe Matcher (with Jake)"] }
                ]
            },
            6: { // Saturday
                name: "Saturday",
                tasks: [
                    { child: "Jay", img: "jay.jpg", chores: ["Up Bathroom (Deep Clean)", "Towel Folder (Fold & Away)"] },
                    { child: "Jake", img: "jake.jpg", chores: ["1/2 Bath (Full Clean)", "Kitchen Mop & Floor Scrub"] },
                    { child: "Nate", img: "nate.jpg", chores: ["Clean Pool Vac Filters", "Daily Pool Skimmer"] },
                    { child: "Ellie", img: "ellie.jpg", chores: ["Dishwasher Unload (AM)", "Basement Toy Reset"] },
                    { child: "Gabe", img: "gabe.jpg", chores: ["Total House Toy Roundup"] },
                    { child: "Vera & Ben", img: "vera_ben.jpg", chores: ["Shoe Consolidation Bin"] }
                ]
            }
        };

        // State Machine Management Logic
        function manageStorageState(currentDay) {
            const storedDay = localStorage.getItem('activeChoreDay');
            
            // If the day changed, wipe out old completion states
            if (storedDay !== String(currentDay)) {
                for (let key in localStorage) {
                    if (key.startsWith('chk-')) {
                        localStorage.removeItem(key);
                    }
                }
                localStorage.setItem('activeChoreDay', currentDay);
            }
        }

        function bindCheckboxListeners() {
            const checkboxes = document.querySelectorAll('.task-item input[type="checkbox"]');
            checkboxes.forEach(box => {
                // Restore checkbox status from memory cache
                if (localStorage.getItem(box.id) === 'checked') {
                    box.checked = true;
                }

                // Listen for physical interaction updates
                box.addEventListener('change', () => {
                    if (box.checked) {
                        localStorage.setItem(box.id, 'checked');
                    } else {
                        localStorage.removeItem(box.id);
                    }
                });
            });
        }

        function buildChoreChart() {
            const today = new Date();
            const dayOfWeek = today.getDay(); 
            
            const gridContainer = document.getElementById('chore-grid');
            const dateDisplay = document.getElementById('date-display');

            // Trigger storage cleanup engine check
            manageStorageState(dayOfWeek);

            if (dayOfWeek === 0) {
                dateDisplay.innerText = "Sunday";
                gridContainer.innerHTML = `
                    <div class="rest-day">
                        <h2>Sabbath Day of Rest</h2>
                        <p>No scheduled tasks. Enjoy your day off together!</p>
                    </div>
                `;
                return;
            }

            const currentDayData = choreDatabase[dayOfWeek];
            dateDisplay.innerText = `${currentDayData.name} Rotation`;

            let gridHTML = '';
            currentDayData.tasks.forEach((group, groupIdx) => {
                let checklistHTML = '';
                group.chores.forEach((chore, choreIdx) => {
                    const uniqueID = `chk-${groupIdx}-${choreIdx}`;
                    checklistHTML += `
                        <div class="task-item" onclick="document.getElementById('${uniqueID}').click(); event.stopPropagation();">
                            <input type="checkbox" id="${uniqueID}" onclick="event.stopPropagation();">
                            <label for="${uniqueID}">${chore}</label>
                        </div>
                    `;
                });

                gridHTML += `
                    <div class="card">
                        <div class="card-header">
                            <img class="avatar" src="${group.img}" alt="${group.child}" onerror="this.style.backgroundColor='rgba(255,255,255,0.1)';">
                            <h2>${group.child}</h2>
                        </div>
                        <div class="task-list">
                            ${checklistHTML}
                        </div>
                    </div>
                `;
            });

            gridContainer.innerHTML = gridHTML;
            
            // Re-bind storage engines to nodes
            bindCheckboxListeners();
        }

        window.onload = buildChoreChart;
    </script>
</body>
</html>
