<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAKboard Wide Large-Font Chore Chart</title>
    <style>
        :root {
            --card-bg: rgba(30, 30, 30, 0.75);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: #b0b0b0;
            --accent-color: #00ffcc;
            --accent-pink: #ff007f;
            --danger-color: #ff4d4d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Montserrat", "Segoe UI", Roboto, sans-serif;
            background-color: transparent !important;
            color: var(--text-main);
            padding: 2vh 1.5vw;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* Header Layout Styling */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2vh;
            border-bottom: 3px solid var(--card-border);
            padding-bottom: 1vh;
            height: 9vh;
        }

        .header h1 {
            font-size: 4.5vh; 
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.3vw;
            color: var(--accent-color); 
            text-shadow: 0 0 12px rgba(0, 255, 204, 0.6);
        }

        .header .day-display {
            font-size: 3.75vh;
            color: var(--accent-pink); 
            text-shadow: 0 0 12px rgba(255, 0, 127, 0.5);
            font-weight: 700;
            text-transform: uppercase;
        }

        .chore-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            grid-gap: 2.5vh 2vw;
            height: calc(100% - 13vh);
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(5px);
            border-radius: 1.5vw;
            padding: 2vh 2vw;
            display: flex;
            flex-direction: row; 
            align-items: center;
            gap: 1.2vw; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .card-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            flex-shrink: 0;
            width: auto;
        }

        .avatar {
            width: 13vh; 
            height: 13vh;
            border-radius: 50%;
            object-fit: cover;
            aspect-ratio: 1 / 1; 
            border: 3px solid var(--card-border);
            background-color: rgba(255,255,255,0.05);
            margin-bottom: 0.8vh;
        }

        .card h2 {
            font-size: 3.8vh;
            font-weight: 800;
            letter-spacing: 0.5px;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        .task-list {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 0.8vh; 
            overflow: hidden; 
            width: 100%;
        }

        .task-item {
            display: flex;
            align-items: flex-start;
            gap: 0.8vw;
            cursor: pointer;
            touch-action: manipulation; 
            width: 100%;
        }

        .task-item input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 3.8vh; 
            height: 3.8vh;
            border: 3px solid var(--text-muted);
            border-radius: 8px;
            outline: none;
            background-color: transparent;
            cursor: pointer;
            display: grid;
            place-content: center;
            flex-shrink: 0;
            margin-top: 0.2vh;
            transition: all 0.1s linear;
        }

        .task-item input[type="checkbox"]:checked {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
        }

        .task-item input[type="checkbox"]:checked::before {
            content: "✓";
            color: #121212;
            font-size: 3vh;
            font-weight: bold;
        }

        .task-item label {
            font-size: 3.4vh; 
            font-weight: 600;
            line-height: 1.15;
            color: var(--text-main);
            cursor: pointer;
            user-select: none;
            white-space: normal; 
            word-wrap: break-word;
            overflow-wrap: break-word;
            display: inline-block;
            flex-grow: 1; /* Pushes the delete button to the far right */
            width: auto;
        }

        .task-item input[type="checkbox"]:checked + label {
            color: var(--text-muted);
            text-decoration: line-through;
            opacity: 0.6;
        }

        /* Delete Button for Custom Chores */
        .delete-btn {
            background: transparent;
            border: none;
            color: var(--danger-color);
            font-size: 4.5vh;
            font-weight: bold;
            line-height: 0.8;
            cursor: pointer;
            padding: 0 0.5vw;
            margin-top: 0.2vh;
            touch-action: manipulation;
            opacity: 0.6;
            transition: opacity 0.1s, transform 0.1s;
            flex-shrink: 0;
        }

        .delete-btn:active {
            opacity: 1;
            transform: scale(0.85);
        }

        .add-task-btn {
            display: flex;
            align-items: center;
            gap: 0.8vw;
            background: transparent;
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 0.4vh 0.6vw;
            color: var(--text-muted);
            font-size: 2.8vh;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 0.4vh;
            touch-action: manipulation; 
        }

        .add-task-btn:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
            background: rgba(0, 255, 204, 0.05);
        }

        .add-icon {
            font-size: 3.2vh;
            font-weight: bold;
            line-height: 1;
            color: var(--accent-color);
        }

        /* --------------------------- */
        /* CUSTOM DAKBOARD MODAL CSS   */
        /* --------------------------- */
        .modal-overlay {
            display: none; 
            position: fixed;
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: var(--card-bg);
            border: 2px solid var(--accent-color);
            border-radius: 1.5vw;
            padding: 3vh 3vw;
            width: 75vw; 
            max-width: 1000px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.4);
        }

        .modal-content h3 {
            font-size: 4vh;
            color: var(--accent-color);
            margin-bottom: 2vh;
        }

        .modal-content input {
            width: 100%;
            padding: 1.5vh 2vw;
            font-size: 4vh;
            border-radius: 8px;
            border: 2px solid var(--card-border);
            background: rgba(255,255,255,0.05);
            color: var(--text-main);
            margin-bottom: 3vh;
            outline: none;
            text-align: center;
        }

        /* --------------------------- */
        /* VIRTUAL KEYBOARD CSS        */
        /* --------------------------- */
        .keyboard {
            display: flex;
            flex-direction: column;
            gap: 1.2vh;
            margin-bottom: 3vh;
        }

        .keyboard-row {
            display: flex;
            justify-content: center;
            gap: 0.8vw;
        }

        .key {
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid var(--card-border);
            color: var(--text-main);
            font-size: 3vh;
            font-weight: bold;
            padding: 1.8vh 1.5vw;
            border-radius: 8px;
            cursor: pointer;
            user-select: none;
            transition: background 0.05s, transform 0.05s; 
            min-width: 4.5vw;
            touch-action: manipulation; 
        }

        .key:active {
            background: var(--accent-color);
            color: #121212;
            border-color: var(--accent-color);
            transform: scale(0.95); 
        }

        .key.wide {
            padding: 1.8vh 3vw;
            min-width: 10vw;
        }

        .key.spacebar {
            width: 40vw;
        }

        .modal-actions {
            display: flex;
            justify-content: space-between;
            gap: 2vw;
        }

        .modal-actions button {
            flex: 1;
            padding: 2vh;
            font-size: 3.5vh;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
            touch-action: manipulation;
        }

        .btn-cancel {
            background: transparent;
            border: 2px solid var(--text-muted) !important;
            color: var(--text-muted);
        }

        .btn-save {
            background: var(--accent-color);
            color: #121212;
        }

        .rest-day {
            grid-column: span 3;
            grid-row: span 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            height: 100%;
        }

        .rest-day h2 {
            font-size: 8vh;
            color: var(--accent-color);
            margin-bottom: 2vh;
            text-transform: uppercase;
        }

        .rest-day p {
            font-size: 4.5vh;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Chore Chart</h1>
        <div class="day-display" id="date-display">Loading...</div>
    </div>

    <div class="chore-grid" id="chore-grid">
        <!-- Rendered dynamically by script -->
    </div>

    <!-- NATIVE CUSTOM MODAL W/ VIRTUAL KEYBOARD -->
    <div id="custom-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="modal-title">Add Chore</h3>
            <input type="text" id="modal-input" placeholder="Tap keys below..." readonly>
            
            <div class="keyboard">
                <div class="keyboard-row">
                    <div class="key" onclick="typeKey('Q')">Q</div>
                    <div class="key" onclick="typeKey('W')">W</div>
                    <div class="key" onclick="typeKey('E')">E</div>
                    <div class="key" onclick="typeKey('R')">R</div>
                    <div class="key" onclick="typeKey('T')">T</div>
                    <div class="key" onclick="typeKey('Y')">Y</div>
                    <div class="key" onclick="typeKey('U')">U</div>
                    <div class="key" onclick="typeKey('I')">I</div>
                    <div class="key" onclick="typeKey('O')">O</div>
                    <div class="key" onclick="typeKey('P')">P</div>
                </div>
                <div class="keyboard-row">
                    <div class="key" onclick="typeKey('A')">A</div>
                    <div class="key" onclick="typeKey('S')">S</div>
                    <div class="key" onclick="typeKey('D')">D</div>
                    <div class="key" onclick="typeKey('F')">F</div>
                    <div class="key" onclick="typeKey('G')">G</div>
                    <div class="key" onclick="typeKey('H')">H</div>
                    <div class="key" onclick="typeKey('J')">J</div>
                    <div class="key" onclick="typeKey('K')">K</div>
                    <div class="key" onclick="typeKey('L')">L</div>
                </div>
                <div class="keyboard-row">
                    <div class="key wide" onclick="typeKey('BACKSPACE')">⌫ Del</div>
                    <div class="key" onclick="typeKey('Z')">Z</div>
                    <div class="key" onclick="typeKey('X')">X</div>
                    <div class="key" onclick="typeKey('C')">C</div>
                    <div class="key" onclick="typeKey('V')">V</div>
                    <div class="key" onclick="typeKey('B')">B</div>
                    <div class="key" onclick="typeKey('N')">N</div>
                    <div class="key" onclick="typeKey('M')">M</div>
                    <div class="key wide" onclick="typeKey('CLEAR')">Clear</div>
                </div>
                <div class="keyboard-row">
                    <div class="key spacebar" onclick="typeKey(' ')">SPACE</div>
                </div>
            </div>

            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-save" onclick="submitModal()">Save Chore</button>
            </div>
        </div>
    </div>

    <script>
        const choreDatabase = {
            1: { name: "Monday", tasks: [
                { child: "Jay", img: "jay.jpg", chores: ["Vacuum: Family Room, Foyer, Steps", "Post-Dinner Wipe", "Dishwasher Loader"] },
                { child: "Jake", img: "jake.jpg", chores: ["Walk Baci", "Recycling Cans to Curb", "Daily Pool Skimmer"] },
                { child: "Nate", img: "nate.jpg", chores: ["Daily Kitchen Trash/Rec", "Vacuum: Laundry Room, Dining Room, Kitchen", "Clean under gazebo/wipe table"] },

                { child: "Jake", img: "jake.jpg", chores: ["Walk Baci", "Bring Recycling Cans Back", "Vacuum: Basement Steps", "Post-Dinner Wipe"] },
                { child: "Nate", img: "nate.jpg", chores: ["LAUNDRY DAY", "Dishwasher Loader", "Daily Pool Skimmer"] },
                { child: "Ellie", img: "ellie.jpg", chores: ["Unload Dishwasher", "Vacuum: Basement"] },
                { child: "Gabe", img: "gabe.jpg", chores: ["Unload Dishwasher", "Basement Toy Reset", "Feed & Water Baci"] },
                { child: "Vera & Ben", img: "vera_ben.jpg", chores: ["Shoe Matcher (with Ellie)"] }
            ]},
            3: { name: "Wednesday", tasks: [
                { child: "Jay", img: "jay.jpg", chores: ["Vacuum: Laundry Room, Dining Room, Kitchen", "Dishwasher Loader", "Clean under gazebo/wipe table"] },
                { child: "Jake", img: "jake.jpg", chores: ["LAUNDRY DAY", "Walk Baci", "Trash Cans to Curb (with Dad)"] },
                { child: "Nate", img: "nate.jpg", chores: ["Daily Kitchen Trash/Rec", "Backyard Poop Scoop", "Daily Pool Skimmer"] },
                { child: "Ellie", img: "ellie.jpg", chores: ["Unload Dishwasher", "Feed & Water Baci", "Pool Towel Roundup", "Post-Dinner Wipe"] },
                { child: "Gabe", img: "gabe.jpg", chores: ["Unload Dishwasher", "Family Room & Foyer Pick"] },
                { child: "Vera & Ben", img: "vera_ben.jpg", chores: ["Toy Reset Helper (with Gabe)"] }
            ]},
            4: { name: "Thursday", tasks: [
                { child: "Jay", img: "jay.jpg", chores: ["LAUNDRY DAY", "Make dinner", "Clean under gazebo/wipe table"] },
                { child: "Jake", img: "jake.jpg", chores: ["Vacuum: Family Room, Foyer, Steps", "Walk Baci", "Bring Trash Cans Back", "Daily Pool Skimmer"] },
                { child: "Nate", img: "nate.jpg", chores: ["Clean Pool Vac Filters", "Post-Dinner Wipe", "Dishwasher Loader"] },
                { child: "Ellie", img: "ellie.jpg", chores: ["Unload Dishwasher", "Upstairs Bathroom (Light Clean)"] },
                { child: "Gabe", img: "gabe.jpg", chores: ["Unload Dishwasher", "Basement Toy Reset", "Feed & Water Baci"] },
                { child: "Vera & Ben", img: "vera_ben.jpg", chores: ["Bookshelf Straighten (with Ellie)"] }
            ]},
            5: { name: "Friday", tasks: [
                { child: "Jay", img: "jay.jpg", chores: ["Pool Towel Roundup", "Daily Pool Skimmer", "Dishwasher Loader"] },
                { child: "Jake", img: "jake.jpg", chores: ["Vacuum: Laundry Room, Dining Room, Kitchen", "Walk Baci", "Backyard Poop Scoop"] },
                { child: "Nate", img: "nate.jpg", chores: ["Vacuum: Basement + Steps", "Clean under gazebo/wipe table"] },
                { child: "Ellie", img: "ellie.jpg", chores: ["Unload Dishwasher", "LAUNDRY DAY", "Feed & Water Baci", "Post-Dinner Wipe"] },
                { child: "Gabe", img: "gabe.jpg", chores: ["Unload Dishwasher", "Family Room & Foyer Pick"] },
                { child: "Vera & Ben", img: "vera_ben.jpg", chores: ["Shoe Matcher (with Jake)"] }
            ]},
            6: { name: "Saturday", tasks: [
                { child: "Jay", img: "jay.jpg", chores: ["Upstairs Bathroom (Deep Clean)", "Clean bedroom", "Towel Folder (Fold & Away)"] },
                { child: "Jake", img: "jake.jpg", chores: ["1/2 Bath (Full Clean)", "Walk Baci", "Kitchen Mop & Floor Scrub"] },
                { child: "Nate", img: "nate.jpg", chores: ["Clean Pool Vac Filters", "Daily Pool Skimmer", "Post-Dinner Wipe", "Dishwasher Loader"] },
                { child: "Ellie", img: "ellie.jpg", chores: ["Unload Dishwasher", "Basement Toy Reset", "Clean under gazebo/wipe table"] },
                { child: "Gabe", img: "gabe.jpg", chores: ["Unload Dishwasher", "Total House Toy Roundup", "Feed & Water Baci"] },
                { child: "Vera & Ben", img: "vera_ben.jpg", chores: ["Shoe Consolidation Bin"] }
            ]}
        };

        // --- VIRTUAL KEYBOARD LOGIC ---
        let cachedInputField = null; 

        function typeKey(key) {
            if (!cachedInputField) {
                cachedInputField = document.getElementById('modal-input');
            }
            
            let currentText = cachedInputField.value;

            if (key === 'BACKSPACE') {
                cachedInputField.value = currentText.slice(0, -1);
            } else if (key === 'CLEAR') {
                cachedInputField.value = '';
            } else {
                if (currentText.length === 0 && key === ' ') return;
                cachedInputField.value = currentText + key;
            }
        }

        // --- CUSTOM MODAL LOGIC ---
        let activeChildForModal = "";

        function openModal(childName) {
            activeChildForModal = childName;
            document.getElementById('modal-title').innerText = `Add Chore for ${childName}`;
            
            if (!cachedInputField) {
                cachedInputField = document.getElementById('modal-input');
            }
            cachedInputField.value = "";
            document.getElementById('custom-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('custom-modal').style.display = 'none';
            activeChildForModal = "";
        }

        function submitModal() {
            if (!cachedInputField) {
                cachedInputField = document.getElementById('modal-input');
            }
            const choreName = cachedInputField.value;
            
            if (choreName && choreName.trim() !== '') {
                const formattedChore = choreName.charAt(0).toUpperCase() + choreName.slice(1).toLowerCase();
                saveCustomChore(activeChildForModal, formattedChore.trim());
                buildChoreChart(); 
            }
            closeModal();
        }

        // --- STORAGE & CHART RENDERING ---
        function getTodayKey() {
            const today = new Date();
            return `${today.getFullYear()}-${today.getMonth() + 1}-${today.getDate()}`;
        }

        function manageStorageState(currentDay) {
            const todayKey = getTodayKey();
            const storedDateKey = localStorage.getItem('activeChoreDateKey');

            if (storedDateKey !== todayKey) {
                for (let key in localStorage) {
                    if (key.startsWith('chk-') || key.startsWith('custom-')) {
                        localStorage.removeItem(key);
                    }
                }
                localStorage.setItem('activeChoreDateKey', todayKey);
            }
        }

        function getCustomChores(childName) {
            const todayKey = getTodayKey();
            const stored = localStorage.getItem(`custom-${todayKey}-${childName}`);
            return stored ? JSON.parse(stored) : [];
        }

        function saveCustomChore(childName, choreText) {
            const todayKey = getTodayKey();
            const chores = getCustomChores(childName);
            chores.push(choreText);
            localStorage.setItem(`custom-${todayKey}-${childName}`, JSON.stringify(chores));
        }

        function deleteCustomChore(childName, choreIndex) {
            const todayKey = getTodayKey();
            const chores = getCustomChores(childName);
            
            // Remove the unique ID checkbox state from storage before deleting the chore
            const checkboxID = `chk-${childName}-custom-${choreIndex}`;
            localStorage.removeItem(checkboxID);

            chores.splice(choreIndex, 1);
            localStorage.setItem(`custom-${todayKey}-${childName}`, JSON.stringify(chores));
            buildChoreChart(); // instantly refreshes DOM
        }

        function bindCheckboxListeners() {
            const checkboxes = document.querySelectorAll('.task-item input[type="checkbox"]');
            checkboxes.forEach(box => {
                if (localStorage.getItem(box.id) === 'checked') {
                    box.checked = true;
                }

                box.addEventListener('change', () => {
                    if (box.checked) {
                        localStorage.setItem(box.id, 'checked');
                    } else {
                        localStorage.removeItem(box.id);
                    }
                });
            });
        }

        function buildChoreChart() {
            const today = new Date();
            const dayOfWeek = today.getDay(); 
            
            const gridContainer = document.getElementById('chore-grid');
            const dateDisplay = document.getElementById('date-display');

            manageStorageState(dayOfWeek);

            if (dayOfWeek === 0) {
                dateDisplay.innerText = "Sunday";
                gridContainer.innerHTML = `
                    <div class="rest-day">
                        <h2>Sabbath Day of Rest</h2>
                        <p>No scheduled tasks. Enjoy your day off together!</p>
                    </div>
                `;
                return;
            }

            const currentDayData = choreDatabase[dayOfWeek];
            dateDisplay.innerText = `${currentDayData.name} Rotation`;

            let gridHTML = '';
            currentDayData.tasks.forEach((group, groupIdx) => {
                let checklistHTML = '';
                
                const customChores = getCustomChores(group.child);
                
                // Map permanent chores so we know they aren't custom
                const mappedBaseChores = group.chores.map((c, i) => ({ text: c, isCustom: false, idx: i }));
                // Map custom chores so we can track their index for the delete function
                const mappedCustomChores = customChores.map((c, i) => ({ text: c, isCustom: true, idx: i }));
                
                const allChores = [...mappedBaseChores, ...mappedCustomChores];

                allChores.forEach((choreObj) => {
                    // Create specific IDs so deleting custom tasks doesn't misalign base task checkboxes
                    const uniqueID = choreObj.isCustom 
                        ? `chk-${group.child.replace(/\s+/g, '')}-custom-${choreObj.idx}` 
                        : `chk-${groupIdx}-base-${choreObj.idx}`;
                    
                    let deleteBtnHTML = '';
                    if (choreObj.isCustom) {
                        deleteBtnHTML = `<button class="delete-btn" onclick="deleteCustomChore('${group.child}', ${choreObj.idx}); event.stopPropagation();">×</button>`;
                    }

                    checklistHTML += `
                        <div class="task-item" onclick="document.getElementById('${uniqueID}').click(); event.stopPropagation();">
                            <input type="checkbox" id="${uniqueID}" onclick="event.stopPropagation();">
                            <label for="${uniqueID}">${choreObj.text}</label>
                            ${deleteBtnHTML}
                        </div>
                    `;
                });

                const addBtnHTML = `
                    <button class="add-task-btn" onclick="openModal('${group.child}')">
                        <span class="add-icon">+</span> Add Chore
                    </button>
                `;

                gridHTML += `
                    <div class="card">
                        <div class="card-header">
                            <img class="avatar" src="${group.img}" alt="${group.child}" onerror="this.style.backgroundColor='rgba(255,255,255,0.1)';">
                            <h2>${group.child}</h2>
                        </div>
                        <div class="task-list">
                            ${checklistHTML}
                            ${addBtnHTML}
                        </div>
                    </div>
                `;
            });

            gridContainer.innerHTML = gridHTML;
            bindCheckboxListeners();
        }

        function scheduleMidnightRefresh() {
            const now = new Date();
            const night = new Date(
                now.getFullYear(),
                now.getMonth(),
                now.getDate() + 1, 
                0, 0, 0
            );
            const msToMidnight = night.getTime() - now.getTime();

            setTimeout(() => {
                buildChoreChart();
                scheduleMidnightRefresh(); 
            }, msToMidnight);
        }

        window.onload = () => {
            buildChoreChart();
            scheduleMidnightRefresh();
        };
    </script>
</body>
</html>
